<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  
  <!-- Grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#334155" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- Icon background circle -->
  <circle cx="250" cy="315" r="120" fill="url(#iconGrad)" opacity="0.2"/>
  
  <!-- Tool icon (wrench + gear) -->
  <g transform="translate(190, 255)">
    <!-- Wrench -->
    <path d="M80 60c0-16.55-13.45-30-30-30-13.8 0-25.4 9.35-28.95 22.1L-22.85 96c-2.1-.7-4.3-1.05-6.6-1.05-11.05 0-20 8.95-20 20s8.95 20 20 20 20-8.95 20-20c0-2.3-.4-4.5-1.05-6.6l43.9-43.9c12.75-3.55 22.1-15.15 22.1-28.95z" 
          fill="white" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Gear -->
    <circle cx="100" cy="100" r="30" fill="none" stroke="white" stroke-width="5"/>
    <circle cx="100" cy="100" r="12" fill="white"/>
    <line x1="100" y1="70" x2="100" y2="80" stroke="white" stroke-width="5"/>
    <line x1="100" y1="120" x2="100" y2="130" stroke="white" stroke-width="5"/>
    <line x1="130" y1="100" x2="120" y2="100" stroke="white" stroke-width="5"/>
    <line x1="80" y1="100" x2="70" y2="100" stroke="white" stroke-width="5"/>
  </g>
  
  <!-- Title -->
  <text x="450" y="280" font-family="Inter, -apple-system, sans-serif" font-size="72" font-weight="700" fill="white">
    DevToolkit
  </text>
  
  <!-- Tagline -->
  <text x="450" y="340" font-family="Inter, -apple-system, sans-serif" font-size="32" font-weight="400" fill="#94a3b8">
    All-in-One Developer Toolkit
  </text>
  
  <!-- Features -->
  <text x="450" y="400" font-family="Inter, -apple-system, sans-serif" font-size="24" font-weight="500" fill="#cbd5e1">
    28 Tools • 100% Client-Side • No Registration
  </text>
  
  <!-- URL -->
  <text x="450" y="460" font-family="JetBrains Mono, monospace" font-size="28" font-weight="600" fill="#6366f1">
    kit.gatrion.my.id
  </text>
  
  <!-- Decorative elements -->
  <circle cx="1050" cy="150" r="80" fill="#6366f1" opacity="0.1"/>
  <circle cx="1100" cy="480" r="60" fill="#8b5cf6" opacity="0.1"/>
</svg>
